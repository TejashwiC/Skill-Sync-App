<div class="screen" id="chatSettingsScreen">
<button class="back-btn" onclick="backChatDashboard()">← Back</button>
          <h2>Chat Settings</h2>
          <div class="user-box" style="margin-bottom:16px;">
            <h3 style="margin:0 0 12px;"><i class="fas fa-bell"></i> Chat Notifications</h3>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;">
              <span>Message Notifications</span>
              <div>
                <button onclick="setChatNotification(true)" style="background:#25D366;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">ON</button>
                <button onclick="setChatNotification(false)" style="background:#e74c3c;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">OFF</button>
</div>
