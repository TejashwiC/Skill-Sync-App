<div class="screen" id="notificationSettingsScreen">
<button class="back-btn" onclick="backSettingsDashboard()">← Back</button>
          <h2>Notification Settings</h2>
          <div class="user-box" style="margin-bottom:16px;">
            <h3 style="margin:0 0 8px;font-size:15px;"><i class="fas fa-user-plus"></i> Follow Notifications</h3>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;">
              <span>Follow Alert</span>
              <div>
                <button id="followNotifON" onclick="setNotification('follow', true)" style="background:#25D366;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600;">ON</button>
                <button id="followNotifOFF" onclick="setNotification('follow', false)" style="background:#ccc;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600;">OFF</button>
</div>
