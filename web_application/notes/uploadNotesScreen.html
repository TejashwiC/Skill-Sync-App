<div class="screen" id="uploadNotesScreen">
<button class="back-btn" onclick="backNotesDashboard()">← Back</button>
          <h2>Upload Notes (PDF)</h2>
          <div style="background:#f8faff;border-radius:14px;padding:20px;border:1.5px solid #dde4f7;">
            <p style="margin:0 0 12px;color:#555;font-size:14px;">📄 Select a PDF file (max 10 MB) to share with all users.</p>
            <input type="file" id="pdfFile" accept="application/pdf" style="display:block;width:100%;margin-bottom:14px;padding:10px;border:2px dashed #3498db;border-radius:10px;background:#fff;cursor:pointer;box-sizing:border-box;">
            <div id="uploadProgressWrap" style="display:none;margin-bottom:12px;">
              <label style="font-size:13px;color:#555;font-weight:600;">Uploading...</label>
              <progress id="uploadProgress" value="0" max="100" style="width:100%;height:12px;border-radius:6px;margin-top:6px;"></progress>
</div>
