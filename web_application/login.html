<!DOCTYPE html>
<html>
<head>
  <title>SkillSync Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

  <div class="container">

    <!-- LOGO -->
    <img src="skillsync-logo.png" class="logo" alt="SkillSync Logo">

    <!-- Subtitle -->
    <p class="subtitle">Login to continue</p>

    <!-- Inputs -->
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <!-- Button -->
    <button onclick="login()">Login</button>

    <!-- Forgot Password -->
    <p style="text-align:center; margin-top:10px;">
      <a href="forgot-password.html" style="color:#3498db; font-size:14px;">Forgot Password?</a>
    </p>

    <p class="login-text">
      New user? <a href="register.html">Register</a>
    </p>

  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
