<div class="screen" id="ratingsSessionScreen">

          <h2>⭐ Rate a Session</h2>

            <h4 style="margin:0 0 10px;">Submit Your Rating</h4>
            <select id="rateSessionSelect" style="margin-bottom:10px;"></select>
            <div id="starRating" style="display:flex;gap:8px;font-size:32px;cursor:pointer;margin-bottom:12px;">
              <span onclick="setRating(1)" id="star1">☆</span>
              <span onclick="setRating(2)" id="star2">☆</span>
              <span onclick="setRating(3)" id="star3">☆</span>
              <span onclick="setRating(4)" id="star4">☆</span>
              <span onclick="setRating(5)" id="star5">☆</span>
</div>
