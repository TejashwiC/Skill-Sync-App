name: 📱 Android E2E Appium Testing (Self-Hosted USB)

on:
  push:
    paths:
      - 'SkillSyncAppium/**'
      - 'SkillSyncApp/**'
      - '.github/workflows/android-e2e.yml'
  pull_request:
    paths:
      - 'SkillSyncAppium/**'
      - 'SkillSyncApp/**'
      - '.github/workflows/android-e2e.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-appium-e2e:
    name: Run 1111 E2E Tests on Physical Phone via USB
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Android APK
        working-directory: ./SkillSyncApp
        run: |
          .\gradlew.bat assembleDebug --no-daemon

      - name: Install Node Dependencies
        working-directory: ./SkillSyncAppium
        run: |
          npm install

      - name: Setup Appium Driver and Run Tests
        working-directory: ./SkillSyncAppium
        shell: bash
        run: |
          echo "Checking for connected Android devices..."
          adb devices
          
          echo "Installing built APK on the connected phone..."
          APK_PATH="../SkillSyncApp/app/build/outputs/apk/debug/app-debug.apk"
          adb install -r "$APK_PATH"
          
          echo "Checking Appium UiAutomator2 Driver..."
          if npx appium driver list --installed 2>/dev/null | grep -q "uiautomator2"; then
              echo "UiAutomator2 driver is already installed. Updating..."
              npx appium driver update uiautomator2 || echo "Update skipped"
          else
              echo "Installing UiAutomator2 driver..."
              npx appium driver install uiautomator2 || echo "Installation failed"
          fi
          
          echo "Starting Appium Server..."
          npx appium --log-level warn > appium.log 2>&1 &
          APPIUM_PID=$!
          
          echo "Waiting for Appium server to respond..."
          TIMEOUT=60
          ELAPSED=0
          while ! curl -s http://localhost:4723/status > /dev/null; do
              sleep 2
              ELAPSED=$((ELAPSED + 2))
              if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Appium server failed to start within $TIMEOUT seconds."
                  cat appium.log
                  exit 1
              fi
          done
          echo "Appium server is up!"
          
          echo "Executing WebDriverIO E2E Tests..."
          set +e
          node node_modules/@wdio/cli/bin/wdio.js run wdio.conf.js
          WDIO_EXIT_CODE=$?
          set -e
          
          # Kill Appium
          kill $APPIUM_PID || true
          
          if [ $WDIO_EXIT_CODE -ne 0 ] || [ ! -f "reports/E2E_SkillSync_Appium_Test_Cases.xlsx" ]; then
              echo "Test run failed or report not found. Generating fallback report..."
              node utils/generateFallbackReport.js
          fi
          
          exit $WDIO_EXIT_CODE

      - name: Prepare reports for GitHub Pages
        if: always()
        shell: bash
        run: |
          mkdir -p public-pages/reports/latest
          mkdir -p public-pages/reports/history/build-${{ github.run_number }}
          if [ -f SkillSyncAppium/reports/execution-report.html ]; then
            cp SkillSyncAppium/reports/execution-report.html public-pages/reports/latest/index.html
            cp SkillSyncAppium/reports/execution-report.html public-pages/reports/history/build-${{ github.run_number }}/index.html
          fi
          if [ -f SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx ]; then
            cp SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx public-pages/reports/latest/
            cp SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx public-pages/reports/history/build-${{ github.run_number }}/
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public-pages
          branch: gh-pages
          clean: false

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Mega-E2E-Reports
          path: |
            SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx
            SkillSyncAppium/reports/execution-report.html
          retention-days: 14
