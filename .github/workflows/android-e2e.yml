name: 📱 Android E2E Appium Testing

on:
  push:
    paths:
      - 'SkillSyncAppium/**'
      - 'SkillSyncApp/**'
      - '.github/workflows/android-e2e.yml'
  pull_request:
    paths:
      - 'SkillSyncAppium/**'
      - 'SkillSyncApp/**'
      - '.github/workflows/android-e2e.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-appium-e2e:
    name: Run 1111 E2E Tests on Emulator
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: ./SkillSyncApp
        run: chmod +x gradlew
        
      - name: Build Android APK
        working-directory: ./SkillSyncApp
        run: ./gradlew assembleDebug --no-daemon

      - name: Install Node Dependencies
        working-directory: ./SkillSyncAppium
        run: npm install

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            cd SkillSyncAppium
            chmod +x scripts/ci_run_tests.sh
            ./scripts/ci_run_tests.sh

      - name: Prepare reports for GitHub Pages
        if: always()
        run: |
          mkdir -p public-pages/reports/latest
          mkdir -p public-pages/reports/history/build-${{ github.run_number }}
          if [ -f SkillSyncAppium/reports/execution-report.html ]; then
            cp SkillSyncAppium/reports/execution-report.html public-pages/reports/latest/index.html
            cp SkillSyncAppium/reports/execution-report.html public-pages/reports/history/build-${{ github.run_number }}/index.html
          fi
          if [ -f SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx ]; then
            cp SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx public-pages/reports/latest/
            cp SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx public-pages/reports/history/build-${{ github.run_number }}/
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public-pages
          branch: gh-pages
          clean: false

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Mega-E2E-Reports
          path: |
            SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx
            SkillSyncAppium/reports/execution-report.html
          retention-days: 14
