name: 📱 Android E2E Appium Testing (Self-Hosted USB)

on:
  push:
    paths:
      - 'SkillSyncAppium/**'
      - 'SkillSyncApp/**'
      - '.github/workflows/android-e2e.yml'
  pull_request:
    paths:
      - 'SkillSyncAppium/**'
      - 'SkillSyncApp/**'
      - '.github/workflows/android-e2e.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-appium-e2e:
    name: Run 1111 E2E Tests on Physical Phone via USB
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Android APK
        working-directory: ./SkillSyncApp
        run: |
          .\gradlew.bat assembleDebug --no-daemon

      - name: Install Node Dependencies
        working-directory: ./SkillSyncAppium
        run: |
          npm install

      - name: Setup Appium Driver and Run Tests
        working-directory: ./SkillSyncAppium
        shell: powershell
        run: |
          Write-Host "Checking for connected Android devices..."
          adb devices
          
          Write-Host "Installing built APK on the connected phone..."
          $APK_PATH = "..\SkillSyncApp\app\build\outputs\apk\debug\app-debug.apk"
          adb install -r $APK_PATH
          
          Write-Host "Checking Appium UiAutomator2 Driver..."
          $installedDrivers = npx appium driver list --installed 2>$null
          if ($installedDrivers -match "uiautomator2") {
              Write-Host "UiAutomator2 driver is already installed. Updating..."
              npx appium driver update uiautomator2 || Write-Host "Update skipped"
          } else {
              Write-Host "Installing UiAutomator2 driver..."
              npx appium driver install uiautomator2 || Write-Host "Installation failed"
          }
          
          Write-Host "Starting Appium Server..."
          $appiumProcess = Start-Process npx -ArgumentList "appium", "--log-level", "warn" -PassThru -NoNewWindow -RedirectStandardOutput appium.log -RedirectStandardError appium_err.log
          
          Write-Host "Waiting for Appium server to respond..."
          $timeout = 60
          $elapsed = 0
          $serverUp = $false
          while ($elapsed -lt $timeout) {
              try {
                  $response = Invoke-RestMethod -Uri "http://localhost:4723/status" -ErrorAction Stop
                  if ($response) {
                      $serverUp = $true
                      break
                  }
              } catch {
                  Start-Sleep -Seconds 2
                  $elapsed += 2
              }
          }
          
          if (-not $serverUp) {
              Write-Host "ERROR: Appium server failed to start within $timeout seconds."
              if (Test-Path appium.log) { Get-Content appium.log }
              if (Test-Path appium_err.log) { Get-Content appium_err.log }
              exit 1
          }
          Write-Host "Appium server is up!"
          
          Write-Host "Executing WebDriverIO E2E Tests..."
          $env:WDIO_CI_SPEC = "./tests/12_e2e/mega_android_1100.test.js"
          $wdioProcess = Start-Process node -ArgumentList "node_modules/@wdio/cli/bin/wdio.js", "run", "wdio.conf.js" -PassThru -Wait -NoNewWindow
          $wdioExitCode = $wdioProcess.ExitCode
          
          Stop-Process -Id $appiumProcess.Id -Force -ErrorAction SilentlyContinue
          
          if (($wdioExitCode -ne 0) -or (-not (Test-Path "reports/E2E_SkillSync_Appium_Test_Cases.xlsx"))) {
              Write-Host "Test run failed or report not found. Generating fallback report..."
              node utils/generateFallbackReport.js
          }
          
          exit $wdioExitCode

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Mega-E2E-Reports
          path: |
            SkillSyncAppium/reports/E2E_SkillSync_Appium_Test_Cases.xlsx
            SkillSyncAppium/reports/execution-report.html
          retention-days: 14

  deploy-reports:
    name: Deploy Reports to GitHub Pages
    needs: android-appium-e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          name: Appium-Mega-E2E-Reports
          path: temp-reports

      - name: Prepare reports for GitHub Pages
        run: |
          mkdir -p public-pages/reports/latest
          mkdir -p public-pages/reports/history/build-${{ github.run_number }}
          if [ -f temp-reports/execution-report.html ]; then
              cp temp-reports/execution-report.html public-pages/reports/latest/index.html
              cp temp-reports/execution-report.html public-pages/reports/history/build-${{ github.run_number }}/index.html
          fi
          if [ -f temp-reports/E2E_SkillSync_Appium_Test_Cases.xlsx ]; then
              cp temp-reports/E2E_SkillSync_Appium_Test_Cases.xlsx public-pages/reports/latest/
              cp temp-reports/E2E_SkillSync_Appium_Test_Cases.xlsx public-pages/reports/history/build-${{ github.run_number }}/
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public-pages
          branch: gh-pages
          clean: false
