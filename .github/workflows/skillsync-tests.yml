name: 🚀 SkillSync — Complete Test Suite

# ──────────────────────────────────────────────────────────────────────────────
# Runs on every push / PR to any branch, plus manual trigger.
# Executes all 4 test categories and uploads a combined .xlsx report artifact.
#
# Test Categories:
#   • API / Unit    — requests-based HTTP checks against live GitHub Pages + Firebase
#   • Validation    — Selenium edge-case form validation tests
#   • Vulnerability — Security / exposure checks against live GitHub Pages
#   • E2E Selenium  — Full 174-test browser automation suite
#
# Artifacts uploaded:
#   • SkillSync-Test-Report-Run-N.xlsx  (30 day retention)
#   • Failure-Screenshots-Run-N          (14 day retention)
#   • Test-Logs-Run-N                    (14 day retention)
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  full-test-suite:
    name: 🧪 Run All Tests & Generate Excel Report
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/requirements.txt

      # ── 3. Install Python dependencies ────────────────────────────────────
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r tests/requirements.txt

      # ── 4. Set up Chrome (stable) ─────────────────────────────────────────
      - name: 🌐 Set up Chrome browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 5. Start local HTTP server on port 8080 ───────────────────────────
      - name: 🚀 Start local HTTP server (port 8080)
        run: |
          python -m http.server 8080 &
          echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login.html)
          echo "login.html local status: $STATUS"
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/dashboard.html)
          echo "dashboard.html local status: $STATUS2"

      # ── 6. Run API & Unit Tests ───────────────────────────────────────────
      - name: 🔬 Run API & Unit Tests (test_12_api_unit)
        env:
          HEADLESS: "true"
        run: |
          cd tests
          python -m pytest test_12_api_unit.py \
            -v \
            --tb=short \
            --no-header \
            -p no:warnings \
            --timeout=30 \
            2>&1 | tee -a pytest_output.txt
        continue-on-error: true

      # ── 7. Run Vulnerability / Security Tests ─────────────────────────────
      - name: 🔒 Run Vulnerability & Security Tests (test_14_vulnerability)
        env:
          HEADLESS: "true"
        run: |
          cd tests
          python -m pytest test_14_vulnerability.py \
            -v \
            --tb=short \
            --no-header \
            -p no:warnings \
            --timeout=30 \
            2>&1 | tee -a pytest_output.txt
        continue-on-error: true

      # ── 8. Run Validation Tests (Selenium) ────────────────────────────────
      - name: ✅ Run Form Validation Tests (test_13_validation)
        env:
          TEST_EMAIL:      ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD:   ${{ secrets.TEST_PASSWORD }}
          TEST_EMAIL_2:    ${{ secrets.TEST_EMAIL_2 }}
          TEST_PASSWORD_2: ${{ secrets.TEST_PASSWORD_2 }}
          BASE_URL:        "http://localhost:8080"
          HEADLESS:        "true"
        run: |
          cd tests
          python -m pytest test_13_validation.py \
            -v \
            --tb=short \
            --no-header \
            -p no:warnings \
            --timeout=60 \
            2>&1 | tee -a pytest_output.txt
        continue-on-error: true

      # ── 9. Run All E2E Selenium Tests (174 tests) ─────────────────────────
      - name: 🧪 Run E2E Selenium Tests (test_01 → test_11)
        env:
          TEST_EMAIL:      ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD:   ${{ secrets.TEST_PASSWORD }}
          TEST_EMAIL_2:    ${{ secrets.TEST_EMAIL_2 }}
          TEST_PASSWORD_2: ${{ secrets.TEST_PASSWORD_2 }}
          BASE_URL:        "http://localhost:8080"
          HEADLESS:        "true"
        run: |
          cd tests
          python -m pytest \
            test_01_login.py \
            test_02_register.py \
            test_03_forgot_password.py \
            test_04_dashboard_home.py \
            test_05_profile.py \
            test_06_users.py \
            test_07_chat.py \
            test_08_session.py \
            test_09_skill_test.py \
            test_10_notes.py \
            test_11_settings.py \
            -v \
            --tb=short \
            --no-header \
            -p no:warnings \
            --timeout=90 \
            2>&1 | tee -a pytest_output.txt
        continue-on-error: true

      # ── 10. Verify Excel report was generated ─────────────────────────────
      - name: 📊 Verify Excel Report
        run: |
          cd tests
          echo "--- Reports folder ---"
          ls -lh reports/ 2>/dev/null || echo "(empty)"
          REPORT=$(ls reports/*.xlsx 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "⚠️  No Excel report found — generating fallback"
            python -c "
          import sys, os
          sys.path.insert(0, '.')
          from report_generator import generate_excel_report
          generate_excel_report([{
              'module': 'runner', 'test_id': 'FALLBACK',
              'test_name': 'Fallback Entry', 'status': 'SKIP',
              'duration': 0, 'error': 'Report not generated by tests'
          }], 'reports')
          "
          else
            echo "✅ Report: $REPORT ($(du -h "$REPORT" | cut -f1))"
          fi

      # ── 11. Upload Excel Report as GitHub Actions artifact ────────────────
      - name: 📎 Upload Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "SkillSync-Test-Report-Run-${{ github.run_number }}-${{ github.ref_name }}"
          path: tests/reports/*.xlsx
          retention-days: 30
          if-no-files-found: warn

      # ── 12. Upload failure screenshots ────────────────────────────────────
      - name: 📸 Upload Failure Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "Failure-Screenshots-Run-${{ github.run_number }}"
          path: tests/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      # ── 13. Upload test logs ──────────────────────────────────────────────
      - name: 📝 Upload Test Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "Test-Logs-Run-${{ github.run_number }}"
          path: |
            tests/pytest_output.txt
            tests/logs/
          retention-days: 14
          if-no-files-found: ignore

      # ── 14. Write GitHub Step Summary ─────────────────────────────────────
      - name: 📋 Write Job Summary
        if: always()
        run: |
          cd tests

          PASSED=$(grep -c " PASSED" pytest_output.txt 2>/dev/null || echo 0)
          FAILED=$(grep -c " FAILED" pytest_output.txt 2>/dev/null || echo 0)
          SKIPPED=$(grep -c " SKIPPED" pytest_output.txt 2>/dev/null || echo 0)
          TOTAL=$((PASSED + FAILED + SKIPPED))

          # Count by category from output
          API_P=$(grep -c "test_12_api_unit.*PASSED" pytest_output.txt 2>/dev/null || echo 0)
          API_F=$(grep -c "test_12_api_unit.*FAILED" pytest_output.txt 2>/dev/null || echo 0)
          VAL_P=$(grep -c "test_13_validation.*PASSED" pytest_output.txt 2>/dev/null || echo 0)
          VAL_F=$(grep -c "test_13_validation.*FAILED" pytest_output.txt 2>/dev/null || echo 0)
          VUL_P=$(grep -c "test_14_vulnerability.*PASSED" pytest_output.txt 2>/dev/null || echo 0)
          VUL_F=$(grep -c "test_14_vulnerability.*FAILED" pytest_output.txt 2>/dev/null || echo 0)

          ICON=$([ "$FAILED" -gt 0 ] && echo "❌" || echo "✅")

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ${ICON} SkillSync Complete Test Suite — Run #${{ github.run_number }}

          | Metric | Value |
          |--------|-------|
          | 🌿 Branch | \`${{ github.ref_name }}\` |
          | 📝 Commit | \`${{ github.sha }}\` |
          | 🎯 Total Tests | **${TOTAL}** |
          | ✅ Passed | **${PASSED}** |
          | ❌ Failed | **${FAILED}** |
          | ⏭ Skipped | **${SKIPPED}** |

          ### By Category

          | Category | ✅ Pass | ❌ Fail |
          |----------|---------|---------|
          | 🔬 API / Unit | ${API_P} | ${API_F} |
          | ✅ Validation | ${VAL_P} | ${VAL_F} |
          | 🔒 Security | ${VUL_P} | ${VUL_F} |
          | 🧪 E2E Selenium | $((PASSED - API_P - VAL_P - VUL_P)) | $((FAILED - API_F - VAL_F - VUL_F)) |

          ### 📥 Download Artifacts
          - 📊 **Excel Report (.xlsx)**: Under *Artifacts* section ↓
          - 📸 **Screenshots**: Failure screenshots (if any)
          - 📝 **Logs**: Full pytest console output

          > 🔗 [View full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          echo "================================================"
          echo "  SkillSync Test Suite — Run #${{ github.run_number }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Total   : ${TOTAL}"
          echo "  Passed  : ${PASSED}"
          echo "  Failed  : ${FAILED}"
          echo "  Skipped : ${SKIPPED}"
          echo "================================================"

      # ── 15. Comment on PR with results ────────────────────────────────────
      - name: 💬 Post results comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let passed = 0, failed = 0, skipped = 0;
            try {
              const out = fs.readFileSync('tests/pytest_output.txt', 'utf8');
              passed  = (out.match(/ PASSED/g)  || []).length;
              failed  = (out.match(/ FAILED/g)  || []).length;
              skipped = (out.match(/ SKIPPED/g) || []).length;
            } catch(e) {}
            const total = passed + failed + skipped;
            const icon  = failed > 0 ? '❌' : '✅';
            const body  = `## ${icon} SkillSync Test Results — Run #${{ github.run_number }}

            | ✅ Passed | ❌ Failed | ⏭ Skipped | 🎯 Total |
            |-----------|-----------|-----------|---------|
            | **${passed}** | **${failed}** | **${skipped}** | **${total}** |

            📊 **[Download Excel Report (.xlsx)](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})** (under Artifacts)
            📸 Failure screenshots also attached if any tests failed.

            > Commit: \`${{ github.sha }}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
