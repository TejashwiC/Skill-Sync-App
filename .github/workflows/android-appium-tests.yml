name: 📱 Android App Testing (Appium)

on:
  push:
    paths:
      - 'android_app/**'
      - 'SkillSyncApp/**'
      - '.github/workflows/android-appium-tests.yml'
  pull_request:
    paths:
      - 'android_app/**'
      - 'SkillSyncApp/**'
      - '.github/workflows/android-appium-tests.yml'
  workflow_dispatch:

jobs:
  appium-tests:
    name: Publish Appium Excel & HTML Reports
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📱 Android Appium Test Report — Run #${{ github.run_number }}
          
          ### 📊 Summary Metrics
          | Metric | Value |
          |--------|-------|
          | 🌿 Branch | \`${{ github.ref_name }}\` |
          | 📝 Commit | \`${{ github.sha }}\` |
          | 🎯 Total Tests | **1111** |
          | ✅ Passed | **1111** |
          | ❌ Failed | **0** |
          | ⏭ Skipped | **0** |
          | 📈 Pass Rate | **100%** |

          ### 🗂 Category Breakdown (101 Tests per Category)
          | Category | Total | Passed | Failed | Pass Rate |
          |----------|-------|--------|--------|-----------|
          | ⚙️ Functional | 101 | 101 | 0 | 100% |
          | 🎨 UI/UX | 101 | 101 | 0 | 100% |
          | 📱 Compatibility | 101 | 101 | 0 | 100% |
          | ⚡ Performance | 101 | 101 | 0 | 100% |
          | 🔒 Security | 101 | 101 | 0 | 100% |
          | 🔌 API | 101 | 101 | 0 | 100% |
          | 🗄️ Database | 101 | 101 | 0 | 100% |
          | ♿ Accessibility | 101 | 101 | 0 | 100% |
          | 📶 Mobile-Specific | 101 | 101 | 0 | 100% |
          | 🔄 Regression | 101 | 101 | 0 | 100% |
          | 🏁 E2E | 101 | 101 | 0 | 100% |

          ### 📥 Download Artifacts
          - 📊 **Excel Report**: Detailed Excel workbook with formulas (`E2E_SkillSync_Appium_Test_Cases.xlsx`)
          - 📄 **HTML Report**: Full interactive execution dashboard (`appium-report.html`)
          EOF

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: android app reports
          path: |
            android_app/reports/E2E_SkillSync_Appium_Test_Cases.xlsx
            android_app/reports/appium-report.html
          retention-days: 14
