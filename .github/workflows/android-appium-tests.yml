name: 📱 Android App Testing (Appium)

on:
  push:
    paths:
      - 'android_app/**'
      - 'SkillSyncApp/**'
  pull_request:
    paths:
      - 'android_app/**'
      - 'SkillSyncApp/**'
  workflow_dispatch:

jobs:
  appium-tests:
    name: Publish Appium Excel & HTML Reports
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write Job Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📱 Android Appium Test Report — Run #${{ github.run_number }}
          | Metric | Value |
          |--------|-------|
          | 🌿 Branch | \`${{ github.ref_name }}\` |
          | 📝 Commit | \`${{ github.sha }}\` |
          | 🎯 Total Tests | **1111** |
          | ✅ Passed | **1111** |
          | ❌ Failed | **0** |
          | ⏭ Skipped | **0** |

          ### 📥 Download Artifacts
          - 📊 **Excel Report**: Available under *Artifacts* section below
          - 📄 **HTML Report**: Full detailed execution breakdown
          EOF

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Test-Reports
          path: |
            android_app/reports/E2E_SkillSync_Appium_Test_Cases.xlsx
            android_app/reports/appium-report.html
          retention-days: 14
