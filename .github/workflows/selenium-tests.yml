name: 🧪 SkillSync Complete E2E Tests (105 Test Cases)

on:
  push:
    branches:
      - web          # Run tests on every push to 'web' branch
      - main
      - master
  pull_request:
    branches:
      - web
      - main
      - master
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  selenium-e2e-tests:
    name: Run 105 E2E Tests & Generate Excel Report
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/requirements.txt

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r tests/requirements.txt

      # ── 4. Setup Chrome ───────────────────────────────────────────────────
      - name: 🌐 Setup Chrome browser
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 5. Start the SkillSync static app server on port 8080 ────────────
      - name: 🚀 Start local HTTP server (port 8080)
        run: |
          # Serve the repo root (where index.html lives)
          python -m http.server 8080 &
          echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV
          sleep 3
          # Verify index.html is reachable
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/index.html)
          echo "index.html HTTP status: $STATUS"
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login.html)
          echo "login.html HTTP status: $STATUS2"

      # ── 6. Run ALL 105 Selenium Tests ────────────────────────────────────
      - name: 🧪 Run Selenium E2E Tests (105 tests)
        env:
          TEST_EMAIL:      ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD:   ${{ secrets.TEST_PASSWORD }}
          TEST_EMAIL_2:    ${{ secrets.TEST_EMAIL_2 }}
          TEST_PASSWORD_2: ${{ secrets.TEST_PASSWORD_2 }}
          BASE_URL:        "http://localhost:8080"
          HEADLESS:        "true"
        run: |
          cd tests
          python -m pytest test_e2e_complete.py \
            -v \
            --tb=short \
            --no-header \
            -p no:warnings \
            2>&1 | tee pytest_output.txt
        continue-on-error: true   # Always generate report even if tests fail

      # ── 7. Verify Excel report was generated ─────────────────────────────────
      - name: 📊 Verify Excel Report
        run: |
          cd tests
          echo "--- Reports folder contents ---"
          ls -lh reports/ 2>/dev/null || echo "Reports folder empty"
          REPORT=$(ls reports/*.xlsx 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "WARNING: No Excel report found (tests may have crashed before completion)"
          else
            echo "✅ Report found: $REPORT"
            ls -lh "$REPORT"
          fi


      # ── 8. Upload Excel Report as downloadable artifact ──────────────────
      - name: 📎 Upload Excel Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "E2E-Report-105-TestCases-Passed"
          path: tests/reports/*.xlsx
          retention-days: 30
          if-no-files-found: warn

      # ── 9. Upload screenshots (from failures) ────────────────────────────
      - name: 📸 Upload Failure Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "Failure-Screenshots-Run-${{ github.run_number }}"
          path: tests/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      # ── 10. Upload test logs ──────────────────────────────────────────────
      - name: 📝 Upload Test Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "Test-Logs-Run-${{ github.run_number }}"
          path: |
            tests/pytest_output.txt
            tests/logs/
          retention-days: 14
          if-no-files-found: ignore

      # ── 11. Print job summary in GitHub Actions UI ───────────────────────
      - name: 📋 Write Job Summary
        if: always()
        run: |
          cd tests

          # Count results from pytest output using wc -l to avoid exit code 1 when no matches
          PASSED=$(grep " PASSED" pytest_output.txt 2>/dev/null | wc -l); PASSED="${PASSED// /}"
          FAILED=$(grep " FAILED" pytest_output.txt 2>/dev/null | wc -l); FAILED="${FAILED// /}"
          SKIPPED=$(grep " SKIPPED" pytest_output.txt 2>/dev/null | wc -l); SKIPPED="${SKIPPED// /}"
          TOTAL=$((PASSED + FAILED + SKIPPED))

          # Write GitHub Step Summary (visible in Actions → Summary tab)
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🧪 SkillSync Complete E2E Test Report — Run #${{ github.run_number }}

          | Metric | Value |
          |--------|-------|
          | 🌿 Branch | \`${{ github.ref_name }}\` |
          | 📝 Commit | \`${{ github.sha }}\` |
          | 🎯 Total Tests | **${TOTAL}** |
          | ✅ Passed | **${PASSED}** |
          | ❌ Failed | **${FAILED}** |
          | ⏭ Skipped | **${SKIPPED}** |

          ### 📥 Download Artifacts
          - 📊 **Excel Report**: Available under *Artifacts* section below
          - 📸 **Screenshots**: Failure screenshots (if any)
          - 📝 **Logs**: Full pytest console output

          > 🔗 [View full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          echo "=============================================="
          echo "  SkillSync E2E — Run #${{ github.run_number }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Total   : ${TOTAL}"
          echo "  Passed  : ${PASSED}"
          echo "  Failed  : ${FAILED}"
          echo "  Skipped : ${SKIPPED}"
          echo "=============================================="

      # ── 12. Comment on PR with results ───────────────────────────────────
      - name: 💬 Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let passed = 0, failed = 0, skipped = 0;
            try {
              const out  = fs.readFileSync('tests/pytest_output.txt', 'utf8');
              passed     = (out.match(/ PASSED/g)  || []).length;
              failed     = (out.match(/ FAILED/g)  || []).length;
              skipped    = (out.match(/ SKIPPED/g) || []).length;
            } catch(e) {}
            const total = passed + failed + skipped;
            const icon  = failed > 0 ? '❌' : '✅';
            const body  = `## ${icon} SkillSync E2E Test Results — Run #${{ github.run_number }}

            | ✅ Passed | ❌ Failed | ⏭ Skipped | 🎯 Total |
            |-----------|-----------|-----------|--------|
            | **${passed}** | **${failed}** | **${skipped}** | **${total}** |

            📎 **[Download Excel Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})** (under Artifacts)
            📸 Screenshots of any failures are also attached.

            > Commit: \`${{ github.sha }}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
