# =============================================================
# .github/workflows/selenium_tests.yml
# SkillSync — Automated Selenium E2E Test Pipeline
#
# Triggers: every push and pull request to any branch
# Output:   single Excel report uploaded as GitHub Actions artifact
# =============================================================

name: SkillSync Selenium E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  selenium-tests:
    name: Run Selenium Tests & Generate Excel Report
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout repository ──────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies ────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('selenium_tests/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install Python dependencies ──────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r selenium_tests/requirements.txt

      # ── 5. Install Google Chrome ─────────────────────────
      - name: Install Google Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 6. Install ChromeDriver (via webdriver-manager) ──
      - name: Install ChromeDriver
        run: |
          python -c "from webdriver_manager.chrome import ChromeDriverManager; ChromeDriverManager().install()"

      # ── 7. Set DISPLAY for headless Chrome ───────────────
      - name: Configure virtual display
        run: |
          export DISPLAY=:99
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # ── 8. Run Selenium tests ─────────────────────────────
      - name: Run Selenium E2E Tests
        working-directory: selenium_tests
        env:
          DISPLAY: ":99"
          PYTHONPATH: "."
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --timeout=120 \
            --no-header \
            -p no:cacheprovider \
            2>&1 | tee test_output.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
        continue-on-error: true

      # ── 9. Verify Excel report was generated ─────────────
      - name: Verify Excel report exists
        working-directory: selenium_tests
        run: |
          REPORT=$(ls E2E_Test_Report_*.xlsx 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "WARNING: Excel report not found — generating fallback"
            python -c "
          import sys, os
          sys.path.insert(0, '.')
          from utils.report_generator import generate_report
          generate_report([{
              'sno': 1, 'tc_id': 'TC000', 'module': 'Runner',
              'scenario': 'Test execution attempted',
              'expected': 'Tests run successfully',
              'actual': 'Tests attempted — check logs',
              'status': 'SKIP', 'remarks': 'See test_output.log for details'
          }])
          "
          else
            echo "✅ Excel report found: $REPORT"
          fi

      # ── 10. Upload Excel report as GitHub Actions artifact ─
      - name: Upload Excel Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: E2E_Test_Report_${{ github.run_number }}
          path: selenium_tests/E2E_Test_Report_*.xlsx
          retention-days: 30
          if-no-files-found: warn

      # ── 11. Upload test logs as artifact ─────────────────
      - name: Upload Test Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_logs_${{ github.run_number }}
          path: selenium_tests/test_output.log
          retention-days: 7
          if-no-files-found: ignore

      # ── 12. Print test summary to Actions log ─────────────
      - name: Print Test Summary
        if: always()
        working-directory: selenium_tests
        run: |
          echo ""
          echo "============================================="
          echo "  SkillSync Selenium Test Run Summary"
          echo "============================================="
          REPORT=$(ls E2E_Test_Report_*.xlsx 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            echo "  📊 Excel Report: $REPORT"
            echo "  📥 Download from: Actions → Artifacts → E2E_Test_Report_${{ github.run_number }}"
          fi
          echo ""
          grep -E "PASSED|FAILED|ERROR|WARNING|passed|failed|error" test_output.log | tail -20 || true
          echo "============================================="
