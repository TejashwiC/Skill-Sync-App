<!DOCTYPE html>
<html>
<head>
  <title>SkillSync - Forgot Password</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .msg-success {
      color: #27ae60;
      background: #eafaf1;
      border: 1px solid #27ae60;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .msg-error {
      color: #e74c3c;
      background: #fdecea;
      border: 1px solid #e74c3c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>

<body class="login-page">

  <div class="container">

    <!-- LOGO -->
    <img src="skillsync-logo.png" class="logo" alt="SkillSync Logo">

    <p class="subtitle">Reset your password</p>
    <p style="text-align:center; color:#888; font-size:13px; margin-bottom:16px;">
      Enter your registered email. SkillSync will send you a password reset link.
    </p>

    <input id="reset-email" type="email" placeholder="Enter your email">

    <button onclick="sendReset()" id="resetBtn">Send Reset Link</button>

    <div id="successMsg" class="msg-success">
      ✅ Reset link sent! Check your email from SkillSync and follow the link to reset your password.
    </div>

    <div id="errorMsg" class="msg-error"></div>

    <p style="text-align:center; margin-top:16px;">
      <a href="login.html" style="color:#3498db; font-size:14px;">← Back to Login</a>
    </p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcvwPSTgRqQB9gSzpk4u3eBJerNpgUr7U",
      authDomain: "skillsync-dc26c.firebaseapp.com",
      projectId: "skillsync-dc26c",
      storageBucket: "skillsync-dc26c.appspot.com",
      messagingSenderId: "45687336565",
      appId: "1:45687336565:web:43432cf08eebef1088523c"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.sendReset = async function () {
      const email      = document.getElementById("reset-email").value.trim();
      const successMsg = document.getElementById("successMsg");
      const errorMsg   = document.getElementById("errorMsg");
      const btn        = document.getElementById("resetBtn");

      successMsg.style.display = "none";
      errorMsg.style.display   = "none";

      if (!email) {
        errorMsg.innerText       = "Please enter your email address.";
        errorMsg.style.display   = "block";
        return;
      }

      btn.disabled    = true;
      btn.innerText   = "Sending...";

      try {
        await sendPasswordResetEmail(auth, email);
        successMsg.style.display = "block";
        btn.innerText            = "Sent!";
      } catch (err) {
        let message = "Something went wrong. Please try again.";
        if (err.code === "auth/user-not-found")   message = "No SkillSync account found with this email.";
        if (err.code === "auth/invalid-email")     message = "Please enter a valid email address.";
        errorMsg.innerText     = message;
        errorMsg.style.display = "block";
        btn.disabled           = false;
        btn.innerText          = "Send Reset Link";
      }
    };
  </script>

</body>
</html>
